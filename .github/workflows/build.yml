name: NextJS Production Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Base
      uses: actions/checkout@v4

    - name: Set Up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Project Dependencies
  run: npm install

    - name: Run ESLinter (Code Perfection Check)
      run: npm run lint

    - name: Execute Production Build
      run: npm run build
